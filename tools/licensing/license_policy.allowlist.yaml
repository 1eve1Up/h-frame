# Inbound license policy for ScanCode-generated SPDX expressions (third-party snippets
# or ambiguous headers detected under first-party paths).
#
# H-Frame is Apache-2.0; this list defines acceptable detected license symbols for this repo.

approved_spdx_license_identifiers:
  - MIT
  - Apache-2.0
  - BSD-2-Clause
  - BSD-3-Clause
  - ISC
  - Python-2.0

# Match paths from ScanCode JSON (`path` uses forward slashes; may include a repo prefix).
# Patterns use segment-wise matching with ``**`` globstar (arbitrary depth) and ``fnmatch`` per segment.
first_party_path_globs:
  - "src/**"
  - "tests/**"
  - "pyproject.toml"
  - "README.md"
  - "LICENSE"
  - "CONTRIBUTING.md"
  - "SECURITY.md"
  - "RELEASES.md"
  - "PRD.md"
  - "REVISION-TO-PRD.md"
  - "AGENTS.md"
  - "tools/licensing/**"
  - ".github/**"

# ScanCode synthetic refs (noise on ambiguous headers). Allowed only under first_party_path_globs.
allowed_license_ref_prefixes:
  - "LicenseRef-scancode-"

options:
  allow_unknown_license_ref_tokens_on_first_party_paths: true
  # Fail if a LicenseRef-scancode-* token appears under paths that are not first-party.
  allow_license_ref_tokens_outside_first_party: false
