name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v${TAG} does not match pyproject.toml version ${VERSION}"
            exit 1
          fi

      - name: Install build tooling
        run: pip install build twine '.[dev]'

      - name: Build sdist and wheel
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: Assert Windows shim in wheel
        run: |
          python - <<'PY'
          import sys
          import zipfile
          from pathlib import Path

          wheels = sorted(Path("dist").glob("h_frame-*.whl"))
          if not wheels:
              sys.exit("no wheel produced")
          with zipfile.ZipFile(wheels[-1]) as zf:
              names = zf.namelist()
          if not any(n.endswith("h-frame-shim-windows-amd64.exe") for n in names):
              sys.exit("wheel missing h-frame-shim-windows-amd64.exe")
          PY

      - name: Lint and test
        run: |
          ruff check src tests
          pytest

      # PyPI upload disabled until Trusted Publisher is configured on pypi.org.
      # Re-enable with pypa/gh-action-pypi-publish@release/v1 and environment: pypi.
