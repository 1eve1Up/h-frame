name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev tools
        run: pip install -e '.[dev]'

      - name: Ruff
        run: |
          if [ ! -d src/hframe ]; then
            echo "Skipping Ruff: src/hframe not present in checkout"
            exit 0
          fi
          ruff check src tests

      - name: Pytest
        run: pytest

  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package, dev tools, and MinGW
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64
          pip install -e '.[dev]'

      - name: Build Windows shim
        run: bash tools/build_windows_shim.sh

      - name: Build and validate wheel
        run: |
          python -m build
          python -m twine check dist/*
          python - <<'PY'
          import zipfile
          from pathlib import Path

          wheel = next(Path("dist").glob("h_frame-*.whl"))
          with zipfile.ZipFile(wheel) as zf:
              names = zf.namelist()
          assert any(n.endswith("hframe-shim-windows-amd64.exe") for n in names)
          PY

  license:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tools/licensing/requirements.txt

      - name: Install libarchive for ScanCode extractcode
        run: sudo apt-get update && sudo apt-get install -y libarchive13

      - name: Install license tooling
        run: pip install -r tools/licensing/requirements.txt

      - name: ScanCode + policy allowlist
        run: bash tools/run-license-compliance.sh
