name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev tools
        run: pip install -e '.[dev]'

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        run: pytest

  license:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tools/licensing/requirements.txt

      - name: Install libarchive for ScanCode extractcode
        run: sudo apt-get update && sudo apt-get install -y libarchive13

      - name: Install license tooling
        run: pip install -r tools/licensing/requirements.txt

      - name: ScanCode + policy allowlist
        run: bash tools/run-license-compliance.sh
